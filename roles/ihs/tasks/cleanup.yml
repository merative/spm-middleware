---
# Cleanup all installer files and extracted directories after installation

- name: Cleanup repo-zips directory
  file:
    path: /tmp/repo-zips
    state: absent
  ignore_errors: yes

- name: Cleanup repo directory
  file:
    path: /tmp/repo
    state: absent
  ignore_errors: yes

- name: Cleanup fp directory
  file:
    path: /tmp/fp
    state: absent
  ignore_errors: yes

- name: Cleanup wct directory
  file:
    path: /tmp/wct
    state: absent
  ignore_errors: yes
